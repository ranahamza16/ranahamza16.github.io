<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — Hamza Rana</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: var(--bg-card);
      padding: 48px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      max-width: 480px;
      width: 100%;
    }
    h1 { font-size: 28px; margin-bottom: 12px; color: #22c55e; }
    p { font-size: 16px; line-height: 1.6; color: var(--text-secondary); margin-bottom: 24px; }
    .btn-back {
      display: inline-block;
      padding: 12px 24px;
      background: var(--text-primary);
      color: var(--bg-main);
      text-decoration: none;
      border-radius: var(--radius);
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-back:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Message Sent Successfully</h1>
    <p>Thank you for reaching out! I've received your message and will get back to you within 24 hours.</p>
    <a href="index.html" class="btn-back">← Back to Portfolio</a>
  </div>
</body>
</html>
